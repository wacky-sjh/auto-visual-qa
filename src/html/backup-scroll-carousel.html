  <script>
    (function () {
        const section = document.getElementById('carouselSection');
        const slides = section.querySelectorAll('.slide');
        const total = slides.length;
        // 연속 오프셋 (0 ~ total-1): 스크롤량에 비례해 다음 이미지가 bottom에서 조금씩 밀려 올라옴
        let offset = 0;
        let isInSection = false;
        // 휠 1픽셀당 오프셋 변화량 (조절 가능)
        const WHEEL_SENSITIVITY = 0.002;
        // 터치 스와이프: 픽셀당 오프셋 (작을수록 덜 민감, 슬라이드 1장당 약 200~250px 스와이프)
        const TOUCH_SENSITIVITY = 0.003;
        // 터치 방향: 1 = 위로 스와이프 시 다음 슬라이드(기본), -1 = 반대(일부 모바일에서 필요)
        const TOUCH_DIRECTION = 1;
        // 히스테리시스: 진입/이탈 비율 (진입을 낮춰 캡처를 더 안정적으로)
        const ENTER_THRESHOLD = 0.80;
        const EXIT_THRESHOLD = 0.5;
        // 자석 스냅: 섹션이 이 비율 이상 보이면 뷰포트에 붙임
        const SNAP_VISIBLE_MIN = 0.75;
        const SNAP_VISIBLE_MAX = 0.99;
        let snapTimeoutId = 0;
        let justSnapped = false;
        // 첫/마지막 이미지에서 이탈 방향으로 연속 스크롤 시 스냅하지 않도록
        let leaveIntentUp = false;
        let leaveIntentDown = false;
  
        function getVisibleRatio() {
            const rect = section.getBoundingClientRect();
            const vh = window.innerHeight;
            const visibleTop = Math.max(0, rect.top);
            const visibleBottom = Math.min(vh, rect.bottom);
            return (visibleBottom - visibleTop) / vh;
        }
  
        function trySnapToViewport() {
            if (justSnapped) return;
            const atFirst = offset <= 0.05;
            const atLast = offset >= total - 1 - 0.05;
            if (atFirst && leaveIntentUp) return;
            if (atLast && leaveIntentDown) return;
            const ratio = getVisibleRatio();
            if (ratio < SNAP_VISIBLE_MIN || ratio > SNAP_VISIBLE_MAX) return;
            const rect = section.getBoundingClientRect();
            const targetScrollY = window.scrollY + rect.top;
            justSnapped = true;
            window.scrollTo({ top: targetScrollY, behavior: 'smooth' });
            setTimeout(function () { justSnapped = false; }, 500);
        }
  
        function applyOffset() {
            slides.forEach(function (slide, i) {
                let y;
                if (offset < i - 1) {
                    y = 100;   // 아직 안 올라온 상태 (아래에)
                } else if (offset >= i + 1) {
                    y = 0;     // 이미 올라온 뒤 (가려짐 또는 최상단)
                } else if (i - 1 <= offset && offset < i) {
                    y = (i - offset) * 100;  // 아래에서 조금씩 밀려 올라오는 중
                } else {
                    y = 0;     // i <= offset < i+1: 현재 보이는 슬라이드
                }
                slide.style.transform = 'translateY(' + y + '%)';
            });
        }
  
        function updateInSection() {
            // 캐러셀 전환 중(중간 인덱스)이면 한 번 캡처된 상태 유지 → 전환 끝까지 페이지 스크롤 안 함
            if (offset > 0.02 && offset < total - 1 - 0.02) {
                isInSection = true;
                return true;
            }
            const ratio = getVisibleRatio();
            if (isInSection) {
                isInSection = ratio >= EXIT_THRESHOLD;
            } else {
                isInSection = ratio >= ENTER_THRESHOLD;
            }
            return isInSection;
        }
  
        function scrollPageUp() {
            const amount = window.innerHeight * 0.4;
            window.scrollBy({ top: -amount, behavior: 'smooth' });
        }
        function scrollPageDown() {
            const amount = window.innerHeight * 0.4;
            window.scrollBy({ top: amount, behavior: 'smooth' });
        }
  
        function handleScrollDelta(deltaY, preventFn) {
            updateInSection();
            const atFirst = offset <= 0;
            const atLast = offset >= total - 1;
            if (atFirst && deltaY < 0) {
                if (preventFn) preventFn();
                leaveIntentUp = true;
                leaveIntentDown = false;
                scrollPageUp();
                return;
            }
            if (atLast && deltaY > 0) {
                if (preventFn) preventFn();
                leaveIntentDown = true;
                leaveIntentUp = false;
                scrollPageDown();
                return;
            }
            leaveIntentUp = false;
            leaveIntentDown = false;
            if (!isInSection) return;
            if (preventFn) preventFn();
            offset += deltaY * WHEEL_SENSITIVITY;
            offset = Math.max(0, Math.min(total - 1, offset));
            applyOffset();
        }
  
        section.addEventListener('wheel', function (e) {
            handleScrollDelta(e.deltaY, function () { e.preventDefault(); });
        }, { passive: false });
  
        let touchStartY = 0;
        let touchStartOffset = 0;
        let willCaptureTouch = false;
        var leaveScrollPending = null;
        section.addEventListener('touchstart', function (e) {
            if (e.touches.length !== 1) return;
            leaveScrollPending = null;
            touchStartY = e.touches[0].clientY;
            touchStartOffset = offset;
            var ratio = getVisibleRatio();
            willCaptureTouch = ratio >= ENTER_THRESHOLD;
            if (willCaptureTouch) updateInSection();
        }, { passive: true });
        section.addEventListener('touchmove', function (e) {
            if (e.touches.length !== 1) return;
            if (willCaptureTouch) e.preventDefault();
            updateInSection();
            var deltaY = touchStartY - e.touches[0].clientY;
            var atFirst = offset <= 0;
            var atLast = offset >= total - 1;
            // 이탈: 첫 슬라이드에서 아래로 스와이프(deltaY<0) → 페이지 위로 / 마지막에서 위로 스와이프(deltaY>0) → 페이지 아래로
            if (atFirst && deltaY < 0) {
                leaveIntentUp = true;
                leaveIntentDown = false;
                leaveScrollPending = 'up';
                return;
            }
            if (atLast && deltaY > 0) {
                leaveIntentDown = true;
                leaveIntentUp = false;
                leaveScrollPending = 'down';
                return;
            }
            leaveScrollPending = null;
            leaveIntentUp = false;
            leaveIntentDown = false;
            if (!willCaptureTouch) return;
            // 위로 스와이프(페이지 아래로 스크롤하는 방향) → 다음 슬라이드. deltaY = touchStartY - clientY (손가락 위로 시 deltaY > 0). TOUCH_DIRECTION으로 기기별 반전 가능.
            offset = touchStartOffset + (TOUCH_DIRECTION * deltaY) * TOUCH_SENSITIVITY;
            offset = Math.max(0, Math.min(total - 1, offset));
            applyOffset();
        }, { passive: false });
        section.addEventListener('touchend', function () {
            if (leaveScrollPending === 'up') scrollPageUp();
            if (leaveScrollPending === 'down') scrollPageDown();
            leaveScrollPending = null;
            touchStartOffset = offset;
            willCaptureTouch = false;
        }, { passive: true });
  
        // 이탈 의도 플래그는 섹션이 거의 화면 밖으로 나갔을 때만 초기화 (이탈 중에 스냅이 다시 걸리지 않도록)
        const LEAVE_CLEAR_RATIO = 0.1;
  
        window.addEventListener('scroll', function () {
            updateInSection();
            var ratio = getVisibleRatio();
            section.style.touchAction = ratio >= ENTER_THRESHOLD ? 'none' : 'auto';
            if (ratio < LEAVE_CLEAR_RATIO) {
                leaveIntentUp = false;
                leaveIntentDown = false;
            }
            clearTimeout(snapTimeoutId);
            snapTimeoutId = setTimeout(function () {
                trySnapToViewport();
            }, 120);
        }, { passive: true });
        section.style.touchAction = getVisibleRatio() >= ENTER_THRESHOLD ? 'none' : 'auto';
  
        applyOffset();
    })();
  </script>
