<style>
/* 헤더 높이 제외한 뷰포트에 캐러셀 꽉 차게 (슬라이드가 뷰포트보다 커서 흔들림 방지) */
.carousel-section {
    --carousel-header-offset: 80px;
    /* height will be set dynamically by JS based on slide count */
    position: relative;
}
.carousel-sticky {
    position: sticky;
    top: var(--carousel-header-offset);
    height: calc(100vh - var(--carousel-header-offset));
    overflow: hidden;
}
.carousel-viewport {
    position: relative;
    width: 100%;
    height: 100%;
}
.carousel-section .slide {
    position: absolute;
    left: 0;
    right: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
    z-index: 0;
}
.carousel-section .slide[data-index="0"] { z-index: 1; }
.carousel-section .slide[data-index="1"] { z-index: 2; }
.carousel-section .slide[data-index="2"] { z-index: 3; }
.carousel-section .slide picture {
    position: absolute;
    left: 0;
    right: 0;
    top: 0;
    bottom: 0;
    display: block;
    z-index: 0;
}
.carousel-section .slide .slide-text-wrap,
.carousel-section .slide .health-food-text-wrap {

}
.carousel-section .slide img {

    gap: 24px;
}
.carousel-section .slide .slide-text-wrap h3 {
    color: #000;
    font-family: Jost;
    font-size: 48px;
    font-style: normal;
    font-weight: 600;
    line-height: 48px;
}
.carousel-section .slide .health-food-text-wrap h3 {
    color: #000;
    text-align: right;

<script>
(function () {
    var section = document.getElementById('carouselSection');
    var slides = section.querySelectorAll('.slide');
    var total = slides.length;

    // ✅ Dynamically set section height based on slide count
    function getViewportHeight() {
        if (window.visualViewport && window.visualViewport.height) {
            return window.visualViewport.height;
        }
        return window.innerHeight;
    }
    function setSectionHeight() {
        var styles = getComputedStyle(section);
        var headerOffset = parseInt(
            styles.getPropertyValue('--carousel-header-offset')
        ) || 0;

        var vh = getViewportHeight();
        section.style.height = (vh * total + headerOffset) + 'px';
    }

    setSectionHeight();
    window.addEventListener('resize', setSectionHeight);
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setSectionHeight);
    }

    function applyOffset(progress) {
        var maxOffset = total - 1;
        var offset = progress * maxOffset;

        slides.forEach(function (slide, i) {
            var y;
            if (offset < i - 1) {
                y = 100;
            } else if (offset >= i + 1) {
                y = 0;
            } else if (i - 1 <= offset && offset < i) {
                y = (i - offset) * 100;
            } else {
                y = 0;
            }
            slide.style.transform = 'translateY(' + y + '%)';
        });
    }

    function handleScroll() {
        var rect = section.getBoundingClientRect();
        var sectionHeight = section.offsetHeight;
        var viewportH = getViewportHeight();

        var scrollStart = rect.top - parseInt(getComputedStyle(section).getPropertyValue('--carousel-header-offset'));
        var scrollRange = sectionHeight - viewportH;

        if (scrollRange <= 0) return;

        var progress = Math.min(
            Math.max(-scrollStart / scrollRange, 0),
            1
        );

        applyOffset(progress);
    }

    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();
})();
</script>
