<script>
(function () {
  var row = document.querySelector('[data-submenu-toggle]');
  var submenu = document.getElementById('shop-submenu');
  var iconWrap = row && row.querySelector('.menu-list__icon');
  var iconPlus = iconWrap && iconWrap.querySelector('.menu-list__icon-plus');
  var iconMinus = iconWrap && iconWrap.querySelector('.menu-list__icon-minus');
  if (!row || !submenu || !iconWrap) return;
  function setIconsByExpanded(expanded) {
    if (iconPlus) {
      if (expanded) iconPlus.setAttribute('hidden', '');
      else iconPlus.removeAttribute('hidden');
    }
    if (iconMinus) {
      if (expanded) iconMinus.removeAttribute('hidden');
      else iconMinus.setAttribute('hidden', '');
    }
  }

  row.addEventListener('click', function (e) {
    if (e.target.tagName === 'A') return;
    var wasHidden = submenu.hidden;
    submenu.hidden = !wasHidden;
    var isExpanded = !submenu.hidden;
    row.setAttribute('aria-expanded', isExpanded);
    setIconsByExpanded(isExpanded);
  });
})();
</script>
